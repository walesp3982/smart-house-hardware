; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
; board_build.partitions = default.csv
extra_scripts = pre:../load.py
build_flags = 
    !uv run ../build_flags.py
build_src_flags =    
    -Wall                        ; activa los warnings más comunes: variables sin usar,
                                 ; comparaciones sospechosas, return faltante, etc.
    -Wextra                      ; warnings adicionales que -Wall no cubre: parámetros
                                 ; sin usar, comparaciones entre signed/unsigned, etc.
    -Wshadow                     ; avisa cuando una variable local oculta otra del scope
                                 ; superior (ej: node_id = node_id en constructores)
    -Wuninitialized              ; avisa cuando usas una variable antes de asignarle
                                 ; un valor (punteros sucios, ints con basura)
    -Wmissing-field-initializers ; avisa cuando inicializas un struct/class pero omites
                                 ; algún campo (ej: Actuator a = {"uuid", 0x01} sin type)
    -fstack-usage                ; genera archivos .su con el uso de stack de cada función,
                                 ; útil para detectar desbordamientos en ESP32
lib_deps = 
    Wire
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.4.3